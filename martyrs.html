
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بيانات الشهداء</title>
    <link rel="stylesheet" href="CSS/FormStyle.css">
</head>
<body>

<div class="container">
    <h2>بيانات الشهداء</h2>

    <label>هل يوجد شهداء في العائلة؟</label>
    <select id="hasMartyrs" onchange="toggleMartyrs()">
        <option value="" selected disabled>اختر</option>
        <option value="yes">نعم</option>
        <option value="no">لا</option>
    </select>

    <div id="martyrsSection" style="display:none;">
        <div id="martyrsContainer"></div>
        <button type="button" class="btn-add" onclick="addMartyr()">+ إضافة شهيد</button>
    </div>

    <br>
    <button type="button" class="btn-submit" onclick="saveMartyrs()">الانتقال لقسم الطلاب</button>
</div>

<script src="JS/MartyrsLogic.js"></script>
</body>
</html>
