<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بيانات الشهداء</title>
    <link rel="stylesheet" href="CSS/FormStyle.css">
</head>
<body>

<div class="container">
    <h2>قسم الشهداء 🕊️</h2>

    <label>هل يوجد شهداء في العائلة؟</label>
    <select id="hasMartyrs" onchange="toggleMartyrs()">
        <option value="" selected disabled>اختر</option>
        <option value="yes">نعم، يوجد</option>
        <option value="no">لا يوجد</option>
    </select>

    <div id="martyrsSection" style="display:none; margin-top: 20px;">
        <div id="martyrsContainer"></div>
        <button type="button" class="btn-add" onclick="addMartyr()" style="background-color: #2196F3; margin-bottom: 20px;">+ إضافة شهيد</button>
    </div>

    <br>
    <button type="button" class="btn-submit" id="submitBtn" onclick="saveMartyrs()">حفظ والانتقال لقسم الطلاب ⬅️</button>
</div>

<script src="JS/MartyrsLogic.js"></script>
</body>
</html>
