<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث بيانات العائلة</title>
    <link rel="stylesheet" href="CSS/FormStyle.css">
</head>

<body>

    <div class="container">
        <h2>تحديث بيانات العائلة</h2>

        <div id="searchSection" style="text-align: center; padding: 20px;">
            <label>أدخل رقم هوية الزوج للتعديل:</label>
            <input type="number" id="searchId" placeholder="رقم الهوية المكون من 9 أرقام"
                style="width: 60%; display: inline-block;">
            <button onclick="fetchData()" class="btn-submit" style="width: 30%; display: inline-block;">بحث
                وتعديل</button>
            <p id="msg" style="display:none; color: blue; font-weight: bold; margin-top: 10px;">جاري جلب البيانات من
                السجلات...</p>
        </div>

        <div id="updateFormSection" style="display:none;">

            <div id="step1" class="form-section active-section">
                <h3>1. البيانات العامة</h3>

                <h4>بيانات الزوج (رب الأسرة)</h4>
                <label>رقم هوية الزوج</label>
                <input type="number" id="husbandId" readonly style="background-color: #e9e9e9;">

                <label>اسم الزوج رباعي</label>
                <input type="text" id="husbandName">

                <label>تاريخ الميلاد</label>
                <input type="date" id="husbandBirth">

                <label>الحالة الاجتماعية</label>
                <select id="status">
                    <option value="متزوج">متزوج</option>
                    <option value="أعزب">أعزب</option>
                    <option value="أرمل">أرمل</option>
                    <option value="مطلق">مطلق</option>
                </select>

                <label>رقم الجوال</label>
                <input type="number" id="phone">

                <label>رقم جوال بديل</label>
                <input type="number" id="altPhone">

                <label>هل يعاني الزوج من أمراض مزمنة؟</label>
                <select id="husbandIll">
                    <option value="لا">لا</option>
                    <option value="نعم">نعم</option>
                </select>

                <label>نوع المرض (إن وجد)</label>
                <input type="text" id="husbandIllType">

                <label>اسم الزوجة رباعي</label>
                <input type="text" id="wifeName">

                <label>رقم هوية الزوجة</label>
                <input type="number" id="wifeId">

                <label>تاريخ ميلاد الزوجة</label>
                <input type="date" id="wifeBirth">

                <label>هل تعاني الزوجة من أمراض مزمنة؟</label>
                <select id="wifeIll">
                    <option value="لا">لا</option>
                    <option value="نعم">نعم</option>
                </select>

                <label>نوع المرض (إن وجد)</label>
                <input type="text" id="wifeIllType">

                <label>عدد أفراد الأسرة الكلي</label>
                <input type="number" id="familyCount">

                <label>عدد الذكور</label>
                <input type="number" id="maleCount">

                <label>عدد الإناث</label>
                <input type="number" id="femaleCount">
                <label>العنوان</label>
                <select id="address" required>
                    <option value="الابراج">الابراج</option>
                    <option value="مسجد الاحسان">مسجد الاحسان</option>
                    <option value="مسجد بلال">مسجد بلال</option>
                    <option value="مسجد الغفار">مسجد الغفار</option>
                    <option value="مسجد الفاروق">مسجد الفاروق</option>
                    <option value="مسجد حمزة">مسجد حمزة</option>
                    <option value="مسجد الحكمة">مسجد الحكمة</option>
                    <option value="مسجد التقوى">مسجد التقوى</option>
                </select>

                <label>عنوان النزوح الحالي</label>
                <input type="text" id="displacement" required>

                <label>العمل</label>
                <select id="work">
                    <option value="موظف رام الله">موظف رام الله</option>
                    <option value="موظف غزة">موظف غزة</option>
                    <option value="قطاع خاص">قطاع خاص</option>
                    <option value="وكالة الغوث">وكالة الغوث</option>
                    <option value="عمل حر">عمل حر</option>
                    <option value="لا يعمل">لا يعمل</option>
                </select>

                <label>الاحتياجات الطبية</label>
                <textarea id="medicalNeeds" rows="3"></textarea>
                <br><br>
                <button type="button" class="btn-submit" onclick="nextStep(1)">التالي: الأبناء ⬅️</button>
            </div>

            <div id="step2" class="form-section">
                <h3>2. الأبناء</h3>
                <div id="childrenContainer"></div>
                <button type="button" class="btn-add" onclick="addChildRow()">+ إضافة ابن جديد</button>
                <br><br>
                <div class="next-btn">
                    <button type="button" class="btn-add" style="background-color: #666;" onclick="prevStep(2)">➡️
                        السابق</button>
                    <button type="button" class="btn-submit" onclick="nextStep(2)">التالي: الجرحى ⬅️</button>
                </div>
            </div>

            <div id="step3" class="form-section">
                <h3>3. الجرحى</h3>
                <div id="injuredContainer"></div>

                <button type="button" class="btn-add" onclick="addInjuredRow()">+ إضافة مصاب جديد</button>
                <br><br>
                <div class="next-btn">
                    <button type="button" class="btn-add" style="background-color: #666;" onclick="prevStep(3)">➡️
                        السابق</button>
                    <button type="button" class="btn-submit" onclick="nextStep(3)">التالي: الشهداء ⬅️</button>
                </div>
            </div>

            <div id="step4" class="form-section">
                <h3>4. الشهداء</h3>
                <div id="martyrsContainer"></div>

                <button type="button" class="btn-add" onclick="addMartyrRow()">+ إضافة شهيد جديد</button>
                <br><br>
                <div class="next-btn">
                    <button type="button" class="btn-add" style="background-color: #666;" onclick="prevStep(4)">➡️
                        السابق</button>
                    <button type="button" class="btn-submit" onclick="nextStep(4)">التالي: الطلاب ⬅️</button>
                </div>
            </div>

            <div id="step5" class="form-section">
                <h3>5. الطلاب الجامعيين</h3>
                <div id="studentContainer"></div>

                <button type="button" class="btn-add" onclick="addStudentRow()">+ إضافة طالب جديد</button>
                <br><br>
                <div class="next-btn">
                    <button type="button" class="btn-add" style="background-color: #666;" onclick="prevStep(5)">➡️
                        السابق</button>
                    <button type="button" class="btn-submit" onclick="submitUpdates()"
                        style="background-color: green;">💾 حفظ التعديلات النهائية</button>
                </div>
            </div>

        </div>
    </div>

    <script src="JS/UpdateLogic.js"></script>
</body>

</html>
