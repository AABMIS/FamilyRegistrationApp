<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قسم المصابين</title>
    <link rel="stylesheet" href="CSS/FormStyle.css">
</head>
<body>

<div class="container">
    <h2>قسم المصابين 🩹</h2>

    <label>هل يوجد مصابون في العائلة؟</label>
    <select id="hasInjured" onchange="toggleInjured()">
        <option value="" selected disabled>اختر</option>
        <option value="yes">نعم، يوجد</option>
        <option value="no">لا يوجد</option>
    </select>

    <div id="injuredSection" style="display:none; margin-top: 20px;">
        <div id="injuredContainer"></div>
        <button type="button" class="btn-add" onclick="addInjured()" style="background-color: #2196F3; margin-bottom: 20px;">+ إضافة مصاب</button>
    </div>

    <br>
    <button type="button" class="btn-submit" id="submitBtn" onclick="saveInjured()">حفظ والانتقال لقسم الشهداء ⬅️</button>
</div>

<script src="JS/InjuredLogic.js"></script>
</body>
</html>
