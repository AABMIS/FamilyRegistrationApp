<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بيانات الطلاب الجامعيين</title>
    <link rel="stylesheet" href="CSS/FormStyle.css">
</head>
<body>

<div class="container">
    <h2>قسم الطلاب الجامعيين 🎓</h2>

    <label>هل يوجد طلاب جامعيين في الأسرة؟</label>
    <select id="hasStudent" onchange="toggleStudent()">
        <option value="" selected disabled>اختر</option>
        <option value="yes">نعم، يوجد</option>
        <option value="no">لا يوجد</option>
    </select>

    <div id="studentSection" style="display:none; margin-top: 20px;">
        <div id="studentContainer"></div>
        <button type="button" class="btn-add" onclick="addStudent()" style="background-color: #2196F3; margin-bottom: 20px;">+ إضافة طالب</button>
    </div>

    <br>
    <button type="button" class="btn-submit" id="submitBtn" onclick="saveStudent()" style="background-color: #4CAF50;">حفظ وإنهاء التسجيل 🏁</button>
</div>

<script src="JS/StudentLogic.js"></script>
</body>
</html>
